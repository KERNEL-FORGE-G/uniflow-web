<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <meta name="title" content="UniFlow — Plateforme Universitaire Centrale" />

    <link rel="canonical" href="https://uniflow.vercel.app" />

    <meta property="og:type" content="website" />

    <meta name="twitter:image" content="https://uniflow.vercel.app/uniflow-logo.png" />
